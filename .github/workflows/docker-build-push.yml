name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
   
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}
        
    - name: Build API Docker Image
      run: docker build -t sandy10/mini-sre-api:latest ./api

    - name: Build Worker Docker Image
      run: docker build -t sandy10/mini-sre-worker:latest ./worker

    - name: Push API Docker Images
      run: docker push sandy10/mini-sre-api:latest

    - name: Push Worker Docker Images
      run: docker push sandy10/mini-sre-worker:latest
